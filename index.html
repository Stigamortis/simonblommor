<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Blomigenkänning</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.16.0"></script>

<style>

body{
font-family: Arial;
background:#f2f4f8;
text-align:center;
padding:40px;
}

h1{
font-size:40px;
margin-bottom:5px;
}

.author{
font-size:20px;
font-weight:bold;
margin-bottom:30px;
}

#status{
display:inline-block;
padding:12px 20px;
border-radius:8px;
background:#e0e0e0;
margin-bottom:25px;
font-weight:bold;
}

input{
margin-top:20px;
}

img{
margin-top:25px;
max-width:300px;
border-radius:10px;
}

#result{
margin-top:25px;
font-size:24px;
font-weight:bold;
}

</style>
</head>

<body>

<h1>🌸 Blomigenkänning</h1>
<div class="author">Simon H — TE23C</div>

<div id="status">⏳ Laddar modell...</div>

<br>

<input type="file" id="imageInput" accept="image/*">

<br>

<img id="preview">

<div id="result"></div>

<script>

let model;

const statusBox = document.getElementById("status");
const preview = document.getElementById("preview");
const result = document.getElementById("result");

const classNames = [
"Maskros",
"Prästkrage",
"Ros",
"Solros",
"Tulpan"
];


async function loadModel(){

try{

model = await tf.loadLayersModel("tfjs_model/model.json");

statusBox.innerHTML = "✅ Modell laddad";

}catch(error){

statusBox.innerHTML = "❌ Fel vid laddning av modell";
console.error(error);

}

}

loadModel();


document.getElementById("imageInput").addEventListener("change", async function(event){

if(!model){
alert("Modellen är inte laddad ännu");
return;
}

const file = event.target.files[0];
preview.src = URL.createObjectURL(file);

preview.onload = async () => {

const tensor = tf.tidy(() => {

return tf.browser.fromPixels(preview)
.resizeBilinear([224,224])
.toFloat()
.div(255)
.expandDims(0);

});


let prediction = model.predict(tensor);

/* KONVERTERA LOGITS → SANNOLIKHETER */
prediction = tf.softmax(prediction);

const data = await prediction.data();

let maxProb = 0;
let index = 0;

for(let i=0;i<data.length;i++){

if(data[i] > maxProb){
maxProb = data[i];
index = i;
}

}

const percent = (maxProb * 100).toFixed(2);

result.innerHTML =
"🌼 Blomart: " + classNames[index] +
"<br>Sannolikhet: " + percent + "%";

};

});

</script>

</body>
</html>
